<!doctype html>
<html lang="it">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Razorpunk Landing Page</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="page-container">
            <!-- Barra superiore -->
            <header class="topbar">
                <div class="topbar-left">
                    <div class="menu-icon">&#9776;</div>
                    <div class="logo">Razorpunk</div>
                </div>

                <div class="topbar-right">
                    <span class="top-icon">⌕</span>
                    <span class="top-icon">☎</span>
                    <span class="top-icon">👤</span>
                </div>
            </header>

            <!-- Contenuto principale -->
            <main class="main-layout">
                <!-- Menu laterale -->
                <aside class="side-menu">
                    <a href="#">Contact</a>
                    <a href="#">Portfolio</a>
                    <a href="#">Product</a>
                    <a href="#">About</a>
                </aside>

                <!-- Area centrale -->
                <section class="hero-section">
                    <div class="hero-left">
                        <h2>Razorpunk Presentation</h2>
                        <p>
                            Lorem ipsum dolor sit amet, consectetur adipiscing
                            elit, sed do eiusmod tempor incididunt ut labore et
                            dolore magna.
                        </p>
                    </div>

                    <!-- Immagine centrale con V -->
                    <div class="hero-image">
                        <img src="img.jpg" alt="Corridoio futuristico" /> 

                        <div class="v-shape">
                            <span class="v-left"></span>
                            <span class="v-right"></span>
                        </div>
                    </div>

                    <div class="hero-right">
                        <h1>Razor<span>punk</span></h1>

                        <div class="hero-buttons">
                            <a href="#" class="btn btn-green">Get Started</a>
                            <a href="#" class="btn btn-outline">Download</a>
                        </div>
                    </div>
                </section>
            </main>
        </div>

        <!-- Piccolo file JS solo per qualche interazione e animazione -->
        <script src="script.js"></script>
    </body>
</html>
